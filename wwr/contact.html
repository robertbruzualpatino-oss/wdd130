<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | White Water Rafting</title>
    <meta name="description"
      content="Get in touch with Whitewater Rafting for reservations, inquiries, or feedback. We are here to help you plan your next adventure.">
    <meta name="author" content="Robert Bruzual">
    <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>
    <header>
        <div class="logo">
            <img src="images/logo.png" alt="Rafting Site Logo">
        </div>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About Us</a></li>
                <li><a href="trips.html">Trips</a></li>
                <li><a href="contact.html">Contact Us</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <h1>Contact Us</h1>

        <section class="company-info">
            <div class="contact-details">
                <p>📍 123 Adventure Lane, River City, ST 12345</p>
                <p>📞 (555) 123-4567</p>
                <p>✉️ info@whitewaterrafting.com</p>
            </div>
            <div class="map">
                <iframe
                  src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d300959.5651102209!2d-65.05048633553818!3d7.649811282576862!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x8dcc18ec3137447f%3A0xe8854354ec30a685!2sR%C3%ADo%20Orinoco!5e0!3m2!1ses-419!2sve!4v1775166037801!5m2!1ses-419!2sve"
                  width="600" height="450" allowfullscreen="" loading="lazy"
                  referrerpolicy="no-referrer-when-downgrade"></iframe>
            </div>
        </section>

        <section class="team">
            <h2>Meet Our Team</h2>
            <div class="team-grid">
                <figure>
                    <img src="images/employee1.jpg" alt="Manager profile">
                    <figcaption>Annie Cox - General Manager</figcaption>
                </figure>
                <figure>
                    <img src="images/employee2.jpg" alt="Lead Guide profile">
                    <figcaption>John Smith - Lead River Guide</figcaption>
                </figure>
                <figure>
                    <img src="images/employee3.jpg" alt="Support Profile">
                    <figcaption>John Doe - Logistics Coordinator</figcaption>
                </figure>
            </div>
        </section>

        <section class="form-container">
            <form action="#" method="post">
                <label for="name">Name:</label>
                <input type="text" id="name" name="user_name" required>

                <label for="email">Email:</label>
                <input type="email" id="email" name="user_email" required>

                <fieldset>
                    <legend>Purpose of Message</legend>
                    <label><input type="radio" id="inquiry" name="purpose" value="inquiry"> General
                        Inquiry</label>
                    <label><input type="radio" id="reservation" name="purpose" value="reservation">
                        Reservation
                        Question</label>
                    <label><input type="radio" id="suggestion" name="purpose" value="suggestion">
                        Website
                        Suggestion</label>
                </fieldset>

                <label for="message">Message:</label>
                <textarea name="user_message" id="message" rows="4"></textarea>

                <label class="newsletter">
                    <input type="checkbox" id="subscribe" name="subscribe" value="yes"> Please
                    subscribe me to the
                    monthly newsletter
                </label>

                <button type="submit">Send Message</button>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 White Rafting Whirlwind - Robert Bruzual</p>
        <nav class="socialmedia">
            <a href="https://facebook.com">
                <img src="images/facebook.svg" alt="Facebook Icon">
            </a>
            <a href="https://whatsapp.com">
                <img src="images/whatsapp.svg" alt="Whatsapp Icon">
            </a>
            <a href="https://instagram.com">
                <img src="images/instagram.svg" alt="Instagram Icon">
            </a>
        </nav>
    </footer>
</body>

</html>
